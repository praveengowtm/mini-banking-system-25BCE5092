<!DOCTYPE html>
<html>
<head>
    <title>Vault Bank</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        input {
            padding: 5px;
            margin: 5px;
        }

        button {
            padding: 6px 12px;
            margin: 5px;
            cursor: pointer;
        }

        textarea {
            width: 80%;
            height: 250px;
            background: black;
            color: lime;
            font-family: monospace;
            padding: 10px;
        }
    </style>
</head>

<body>

<h2>🏦 Vault Bank</h2>

<h3>Create Account</h3>
<input id="accNo" placeholder="Account No">
<input id="name" placeholder="Name">
<input id="balance" placeholder="Balance">
<button onclick="createAccount()">Create</button>

<h3>Deposit</h3>
<input id="d_acc" placeholder="Account No">
<input id="d_amt" placeholder="Amount">
<button onclick="deposit()">Deposit</button>

<h3>Withdraw</h3>
<input id="w_acc" placeholder="Account No">
<input id="w_amt" placeholder="Amount">
<button onclick="withdraw()">Withdraw</button>

<br><br>
<button onclick="summary()">View Summary</button>
<button onclick="clearScreen()">Clear</button>

<br><br>

<textarea id="output" readonly></textarea>

<script>
/* ✅ TERMINAL OUTPUT SETUP */
var Module = {
    print: function(text) {
        let out = document.getElementById("output");
        out.value += text + "\n";
        out.scrollTop = out.scrollHeight; // auto scroll
    }
};

/* ✅ INPUT FUNCTIONS */

function createAccount() {
    Module.print(">> Creating Account...");

    Module.ccall('ui_create_account', null,
        ['string','string','number'],
        [
            accNo.value,
            name.value,
            parseFloat(balance.value)
        ]);
}

function deposit() {
    Module.print(">> Depositing...");

    Module.ccall('ui_deposit', null,
        ['string','number'],
        [
            d_acc.value,
            parseFloat(d_amt.value)
        ]);
}

function withdraw() {
    Module.print(">> Withdrawing...");

    Module.ccall('ui_withdraw', null,
        ['string','number'],
        [
            w_acc.value,
            parseFloat(w_amt.value)
        ]);
}

function summary() {
    Module.print(">> Showing Summary...");

    Module.ccall('ui_summary', null, [], []);
}

/* ✅ CLEAR TERMINAL */
function clearScreen() {
    document.getElementById("output").value = "";
}
</script>

<script src="index.js"></script>

</body>
</html>

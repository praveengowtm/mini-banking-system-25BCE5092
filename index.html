<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Banking System</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }
        .header { background: #1a3a5c; color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 1.5rem; }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .nav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center; }
        .nav button { padding: 10px 16px; border: 2px solid #1a3a5c; background: white; color: #1a3a5c; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s; }
        .nav button:hover, .nav button.active { background: #1a3a5c; color: white; }
        .panel { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
        .panel.active { display: block; }
        .panel h2 { margin-bottom: 16px; color: #1a3a5c; font-size: 1.2rem; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .btn { padding: 10px 24px; background: #1a3a5c; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: 600; }
        .btn:hover { background: #2a5a8c; }
        .output { margin-top: 16px; padding: 14px; background: #f8f9fa; border-left: 4px solid #1a3a5c; border-radius: 4px; font-family: monospace; font-size: 0.9rem; white-space: pre-wrap; min-height: 40px; }
        .output.error { border-left-color: #dc3545; color: #dc3545; }
        .output.success { border-left-color: #28a745; color: #28a745; }
        .loading { text-align: center; padding: 40px; font-size: 1.1rem; color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        th { background: #1a3a5c; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏦 Mini Banking System — Personal Savings Account</h1>
    </div>
    <div class="container">
        <div class="loading" id="loading">Loading WebAssembly module...</div>
        <div id="app" style="display:none;">
            <div class="nav">
                <button onclick="showPanel('create')" id="btn-create">Create Account</button>
                <button onclick="showPanel('deposit')" id="btn-deposit">Deposit</button>
                <button onclick="showPanel('withdraw')" id="btn-withdraw">Withdraw</button>
                <button onclick="showPanel('balance')" id="btn-balance">Balance Enquiry</button>
                <button onclick="showPanel('history')" id="btn-history">Transactions</button>
                <button onclick="showPanel('reports')" id="btn-reports">Reports</button>
            </div>

            <div class="panel" id="panel-create">
                <h2>Create New Account</h2>
                <label>Account No</label><input id="c-accno" placeholder="e.g. A001">
                <label>Name</label><input id="c-name" placeholder="Account holder name">
                <label>Initial Balance</label><input id="c-balance" type="number" value="0" min="0">
                <button class="btn" onclick="createAccount()">Create</button>
                <div class="output" id="c-output"></div>
            </div>

            <div class="panel" id="panel-deposit">
                <h2>Deposit</h2>
                <label>Account No</label><input id="d-accno" placeholder="e.g. A001">
                <label>Amount</label><input id="d-amount" type="number" min="1">
                <button class="btn" onclick="doDeposit()">Deposit</button>
                <div class="output" id="d-output"></div>
            </div>

            <div class="panel" id="panel-withdraw">
                <h2>Withdraw</h2>
                <label>Account No</label><input id="w-accno" placeholder="e.g. A001">
                <label>Amount</label><input id="w-amount" type="number" min="1">
                <button class="btn" onclick="doWithdraw()">Withdraw</button>
                <div class="output" id="w-output"></div>
            </div>

            <div class="panel" id="panel-balance">
                <h2>Balance Enquiry</h2>
                <label>Account No</label><input id="b-accno" placeholder="e.g. A001">
                <button class="btn" onclick="doBalance()">Check</button>
                <div class="output" id="b-output"></div>
            </div>

            <div class="panel" id="panel-history">
                <h2>Transaction History (Last 5)</h2>
                <label>Account No</label><input id="h-accno" placeholder="e.g. A001">
                <button class="btn" onclick="doHistory()">View</button>
                <div id="h-output"></div>
            </div>

            <div class="panel" id="panel-reports">
                <h2>Reports</h2>
                <button class="btn" onclick="reportTotal()" style="margin-right:8px;">Total Money</button>
                <button class="btn" onclick="promptLowBal()">Low Balance Accounts</button>
                <div style="margin-top:12px;" id="threshold-div" hidden>
                    <label>Threshold</label><input id="r-threshold" type="number" value="500" min="0">
                    <button class="btn" onclick="reportLow()">Show</button>
                </div>
                <div class="output" id="r-output"></div>
            </div>
        </div>
    </div>

    <!-- Load emscripten glue JS -->
    <script src="index.js"></script>
    <script>
        // Wait for WASM module to be ready
        Module.onRuntimeInitialized = function() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';

            // Initialize the bank system in C
            Module.ccall('initBank', null, [], []);

            showPanel('create');
        };

        // Helper: call a C function that returns a string (char*), parse as JSON
        function callC(funcName, argTypes, args) {
            var ptr = Module.ccall(funcName, 'number', argTypes, args);
            var jsonStr = Module.UTF8ToString(ptr);
            return JSON.parse(jsonStr);
        }

        // ===== UI Logic =====
        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
            document.querySelectorAll('.nav button').forEach(function(b) { b.classList.remove('active'); });
            document.getElementById('panel-' + id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active');
            var td = document.getElementById('threshold-div');
            if (td) td.setAttribute('hidden', '');
        }

        function setOutput(id, msg, type) {
            var el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'output' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
        }

        function createAccount() {
            var accNo = document.getElementById('c-accno').value.trim();
            var name = document.getElementById('c-name').value.trim();
            var bal = parseFloat(document.getElementById('c-balance').value) || 0;
            if (!accNo || !name) return setOutput('c-output', 'Please fill Account No and Name.', 'error');
            var r = callC('createAccount', ['string', 'string', 'number'], [accNo, name, bal]);
            setOutput('c-output', r.msg, r.ok ? 'success' : 'error');
        }

        function doDeposit() {
            var accNo = document.getElementById('d-accno').value.trim();
            var amt = parseFloat(document.getElementById('d-amount').value);
            if (!accNo) return setOutput('d-output', 'Enter Account No.', 'error');
            var r = callC('deposit', ['string', 'number'], [accNo, amt]);
            setOutput('d-output', r.msg, r.ok ? 'success' : 'error');
        }

        function doWithdraw() {
            var accNo = document.getElementById('w-accno').value.trim();
            var amt = parseFloat(document.getElementById('w-amount').value);
            if (!accNo) return setOutput('w-output', 'Enter Account No.', 'error');
            var r = callC('withdraw', ['string', 'number'], [accNo, amt]);
            setOutput('w-output', r.msg, r.ok ? 'success' : 'error');
        }

        function doBalance() {
            var accNo = document.getElementById('b-accno').value.trim();
            if (!accNo) return setOutput('b-output', 'Enter Account No.', 'error');
            var r = callC('balanceEnquiry', ['string'], [accNo]);
            setOutput('b-output', r.msg, r.ok ? 'success' : 'error');
        }

        function doHistory() {
            var accNo = document.getElementById('h-accno').value.trim();
            var out = document.getElementById('h-output');
            var r = callC('getTransactionHistory', ['string'], [accNo]);
            if (!r.ok) { out.innerHTML = '<div class="output error">' + r.msg + '</div>'; return; }
            if (!r.transactions.length) { out.innerHTML = '<div class="output">No transactions.</div>'; return; }
            var html = '<table><tr><th>Txn#</th><th>Type</th><th>Amount</th><th>Date/Time</th></tr>';
            r.transactions.forEach(function(t) {
                html += '<tr><td>' + t.txnNo + '</td><td>' + t.type + '</td><td>' + t.amount + '</td><td>' + t.dateTime + '</td></tr>';
            });
            html += '</table>';
            out.innerHTML = html;
        }

        function reportTotal() {
            var r = callC('reportTotalMoney', [], []);
            setOutput('r-output', r.msg, 'success');
        }

        function promptLowBal() {
            document.getElementById('threshold-div').removeAttribute('hidden');
        }

        function reportLow() {
            var t = parseFloat(document.getElementById('r-threshold').value) || 500;
            var r = callC('reportLowBalance', ['number'], [t]);
            if (!r.accounts.length) return setOutput('r-output', 'No accounts below ' + t + '.', 'success');
            var msg = 'Accounts below ' + t + ':\n';
            r.accounts.forEach(function(a) { msg += '  ' + a.accNo + ' - ' + a.name + ' - Balance: ' + a.balance + '\n'; });
            setOutput('r-output', msg, 'error');
        }
    </script>
</body>
</html>

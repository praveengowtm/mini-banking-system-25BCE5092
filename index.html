<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Banking System</title>

<style>

body{
background:#0f172a;
font-family:Arial, Helvetica, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:900px;
background:#111827;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
padding:25px;
}

.header{
font-size:28px;
font-weight:bold;
color:#22c55e;
margin-bottom:15px;
}

.terminal{
background:black;
color:#00ff9c;
height:380px;
overflow-y:auto;
padding:15px;
border-radius:6px;
font-family:monospace;
white-space:pre-wrap;
}

.controls{
display:flex;
margin-top:15px;
gap:10px;
}

input{
flex:1;
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
outline:none;
background:#1f2937;
color:white;
}

button{
padding:12px 25px;
font-size:16px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#16a34a;
}

.menu{
margin-top:15px;
font-size:14px;
color:#9ca3af;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
Mini Banking System
</div>

<div id="output" class="terminal"></div>

<div class="controls">
<input id="input" placeholder="Enter option or value">
<button onclick="sendInput()">Submit</button>
</div>

<div class="menu">
Menu: 1 Create | 2 Deposit | 3 Withdraw | 4 View | 5 Search | 6 Transactions | 7 Exit
</div>

</div>

<script>

var output=document.getElementById("output");
var input=document.getElementById("input");

var inputBuffer=[];

var Module={

print:function(text){
output.innerHTML+=text+"\n";
output.scrollTop=output.scrollHeight;
},

printErr:function(text){
output.innerHTML+=text+"\n";
},

preRun:[function(){

FS.init(

function stdin(){
return inputBuffer.length?inputBuffer.shift():null;
},

function stdout(c){
output.innerHTML+=String.fromCharCode(c);
output.scrollTop=output.scrollHeight;
},

function stderr(c){
output.innerHTML+=String.fromCharCode(c);
}

);

}]

};

function sendInput(){

let text=input.value+"\n";

for(let i=0;i<text.length;i++){
inputBuffer.push(text.charCodeAt(i));
}

input.value="";
input.focus();

}

</script>

<script src="index.js"></script>

</body>
</html>

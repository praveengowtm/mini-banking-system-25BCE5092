<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Banking System</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:900px;
background:#111827;
border-radius:10px;
padding:25px;
}

.title{
font-size:28px;
color:#22c55e;
margin-bottom:10px;
}

#output{
background:black;
color:#00ff9c;
height:380px;
overflow-y:auto;
padding:15px;
font-family:monospace;
white-space:pre-wrap;
border-radius:6px;
}

.controls{
margin-top:15px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:12px;
font-size:16px;
border-radius:6px;
border:none;
background:#1f2937;
color:white;
}

button{
padding:12px 25px;
font-size:16px;
background:#22c55e;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

</style>
</head>

<body>

<div class="container">

<div class="title">Mini Banking System</div>

<div id="output"></div>

<div class="controls">
<input id="input" placeholder="Enter option or value">
<button onclick="sendInput()">Submit</button>
</div>

</div>

<script>

let output=document.getElementById("output");
let input=document.getElementById("input");

let stdinBuffer=[];

var Module={

print:function(text){
output.innerHTML+=text+"\\n";
output.scrollTop=output.scrollHeight;
},

printErr:function(text){
output.innerHTML+=text+"\\n";
},

preRun:[function(){

FS.init(

function(){
return stdinBuffer.length?stdinBuffer.shift():null;
},

function(c){
output.innerHTML+=String.fromCharCode(c);
output.scrollTop=output.scrollHeight;
},

function(c){
output.innerHTML+=String.fromCharCode(c);
}

);

}]

};

function sendInput(){

let txt=input.value+"\\n";

for(let i=0;i<txt.length;i++){
stdinBuffer.push(txt.charCodeAt(i));
}

input.value="";
input.focus();

}

</script>

<script src="index.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Mini Banking System</title>

<style>
body{
font-family: monospace;
background:#111;
color:#0f0;
margin:40px;
}

#output{
width:100%;
height:400px;
background:black;
padding:10px;
overflow:auto;
border:1px solid #0f0;
white-space:pre-wrap;
}

#controls{
margin-top:10px;
}

#input{
width:70%;
padding:10px;
font-size:16px;
background:black;
color:#0f0;
border:1px solid #0f0;
}

button{
padding:10px 20px;
font-size:16px;
background:#0f0;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Mini Banking System</h2>

<div id="output"></div>

<div id="controls">
<input id="input" placeholder="Enter menu choice or value">
<button onclick="sendInput()">Submit</button>
</div>

<script>

var output = document.getElementById("output");
var input = document.getElementById("input");

var inputBuffer = [];

var Module = {

print: function(text){
output.innerHTML += text + "\n";
output.scrollTop = output.scrollHeight;
},

printErr: function(text){
output.innerHTML += text + "\n";
},

preRun: [function(){

FS.init(

function stdin() {
return inputBuffer.length ? inputBuffer.shift() : null;
},

function stdout(c) {
output.innerHTML += String.fromCharCode(c);
},

function stderr(c) {
output.innerHTML += String.fromCharCode(c);
}

);

}]

};

function sendInput(){

var text = input.value + "\n";

for(let i=0;i<text.length;i++){
inputBuffer.push(text.charCodeAt(i));
}

input.value="";
input.focus();

}

</script>

<script src="index.js"></script>

</body>
</html>

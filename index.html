<!DOCTYPE html>
<html>
<head>
    <title>Vault Bank</title>
</head>

<body>

<h2>🏦 Vault Bank</h2>

<h3>Create Account</h3>
<input id="accNo" placeholder="Account No">
<input id="name" placeholder="Name">
<input id="balance" placeholder="Balance">
<button onclick="createAccount()">Create</button>

<h3>Deposit</h3>
<input id="d_acc" placeholder="Account No">
<input id="d_amt" placeholder="Amount">
<button onclick="deposit()">Deposit</button>

<h3>Withdraw</h3>
<input id="w_acc" placeholder="Account No">
<input id="w_amt" placeholder="Amount">
<button onclick="withdraw()">Withdraw</button>

<br><br>
<button onclick="summary()">View Summary</button>

<br><br>

<textarea id="output" rows="10" cols="80"></textarea>

<script>
/* ✅ DEFINE MODULE FIRST (CRITICAL FIX) */
var Module = {
    print: function(text) {
        let out = document.getElementById("output");
        out.value += text + "\n";
    }
};

/* ✅ FUNCTIONS */
function createAccount() {
    Module.ccall('ui_create_account', null,
        ['string','string','number'],
        [
            accNo.value,
            name.value,
            parseFloat(balance.value)
        ]);
}

function deposit() {
    Module.ccall('ui_deposit', null,
        ['string','number'],
        [
            d_acc.value,
            parseFloat(d_amt.value)
        ]);
}

function withdraw() {
    Module.ccall('ui_withdraw', null,
        ['string','number'],
        [
            w_acc.value,
            parseFloat(w_amt.value)
        ]);
}

function summary() {
    Module.ccall('ui_summary', null, [], []);
}
</script>

<!-- ✅ LOAD JS AFTER MODULE -->
<script src="index.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Vault Bank</title>
</head>

<body>

<h2>Vault Bank</h2>
<p id="status">Loading...</p>

<h3>Create</h3>
<input id="accNo" placeholder="Account No">
<input id="name" placeholder="Name">
<input id="bal" placeholder="Balance">
<button onclick="create()">Create</button>

<h3>Deposit</h3>
<input id="dacc" placeholder="Account No">
<input id="damt" placeholder="Amount">
<button onclick="deposit()">Deposit</button>

<h3>Withdraw</h3>
<input id="wacc" placeholder="Account No">
<input id="wamt" placeholder="Amount">
<button onclick="withdraw()">Withdraw</button>

<br><br>
<button onclick="summary()">Summary</button>

<br><br>
<textarea id="out" rows="10" cols="80"></textarea>

<script>
var Module = {
    onRuntimeInitialized: function() {
        document.getElementById("status").innerText = "Ready";
    },
    print: function(text) {
        let o = document.getElementById("out");
        o.value += text + "\n";
    }
};

function create() {
    Module.ccall("ui_create_account", null,
        ["string","string","number"],
        [accNo.value, name.value, parseFloat(bal.value)]);
}

function deposit() {
    Module.ccall("ui_deposit", null,
        ["string","number"],
        [dacc.value, parseFloat(damt.value)]);
}

function withdraw() {
    Module.ccall("ui_withdraw", null,
        ["string","number"],
        [wacc.value, parseFloat(wamt.value)]);
}

function summary() {
    Module.ccall("ui_summary", null, [], []);
}
</script>

<script src="index.js"></script>

</body>
</html>

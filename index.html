<!DOCTYPE html>
<html>
<head>
<title>Mini Banking System</title>

<style>
body{
font-family:monospace;
background:#111;
color:#0f0;
}

#output{
width:100%;
height:400px;
background:black;
color:#0f0;
padding:10px;
overflow:auto;
}

#input{
width:100%;
padding:10px;
font-size:16px;
}
</style>
</head>

<body>

<h2>Mini Banking System</h2>

<div id="output"></div>

<input id="input" placeholder="Type input and press Enter"/>

<script>

var output=document.getElementById("output");

var Module={
print:function(text){
output.innerHTML+=text+"<br>";
output.scrollTop=output.scrollHeight;
},
printErr:function(text){
output.innerHTML+=text+"<br>";
}
};

</script>

<script src="main.js"></script>

<script>

var input=document.getElementById("input");

input.addEventListener("keydown",function(e){

if(e.key==="Enter"){

let val=input.value+"\n";

for(let i=0;i<val.length;i++)
Module.stdin(val.charCodeAt(i));

input.value="";
}

});

</script>

</body>
</html>

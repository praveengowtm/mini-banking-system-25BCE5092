<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vault Bank System</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e13;
  --panel:#111520;
  --border:#1c2235;
  --gold:#e2b84a;
  --gold2:#7a5e1a;
  --green:#39d98a;
  --red:#ff5f5f;
  --text:#d4d8e8;
  --dim:#4a5270;
  --cursor:#e2b84a;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{
  font-family:'JetBrains Mono',monospace;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

/* ── Header Bar ─────────────────────────────────────── */
.header{
  width:100%;max-width:900px;
  display:flex;align-items:center;gap:14px;
  padding:14px 20px 0;
  flex-shrink:0;
}
.logo{
  font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;
  color:var(--gold);letter-spacing:.06em;
}
.logo span{color:var(--dim)}
.tag{
  font-size:.6rem;padding:3px 10px;border-radius:20px;
  background:rgba(226,184,74,.1);border:1px solid var(--gold2);
  color:var(--gold);letter-spacing:.1em;text-transform:uppercase;
}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);margin-left:auto;
     box-shadow:0 0 6px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.dot-label{font-size:.65rem;color:var(--dim)}

/* ── Terminal Window ──────────────────────────────── */
.window{
  width:100%;max-width:900px;flex:1;
  margin:12px 0 0;
  display:flex;flex-direction:column;
  border:1px solid var(--border);
  border-radius:12px;overflow:hidden;
}

/* Title bar */
.titlebar{
  background:#0d1018;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:7px;
  padding:10px 16px;flex-shrink:0;
}
.tb-dot{width:11px;height:11px;border-radius:50%}
.tb-dot:nth-child(1){background:#ff5f56}
.tb-dot:nth-child(2){background:#ffbd2e}
.tb-dot:nth-child(3){background:#27c93f}
.tb-title{
  margin-left:auto;font-size:.65rem;color:var(--dim);
  letter-spacing:.08em;
}
.tb-title span{color:var(--gold)}

/* Output area */
#output{
  flex:1;overflow-y:auto;
  background:var(--bg);
  padding:16px 20px;
  font-size:.82rem;line-height:1.7;
  color:var(--text);
  white-space:pre-wrap;
  word-break:break-word;
}

/* Scrollbar */
#output::-webkit-scrollbar{width:4px}
#output::-webkit-scrollbar-track{background:transparent}
#output::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Colour rules for output text */
#output .c-gold  {color:var(--gold)}
#output .c-green {color:var(--green)}
#output .c-red   {color:var(--red)}
#output .c-dim   {color:var(--dim)}

/* ── Input Row ───────────────────────────────────── */
.input-row{
  background:#0d1018;
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  padding:10px 16px;gap:10px;
  flex-shrink:0;
}
.prompt-sym{color:var(--gold);font-size:.85rem;user-select:none}
#input{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-family:'JetBrains Mono',monospace;
  font-size:.82rem;caret-color:var(--cursor);
}
#input::placeholder{color:var(--dim)}
.send-btn{
  background:none;border:1px solid var(--border);
  color:var(--dim);font-family:'JetBrains Mono',monospace;
  font-size:.7rem;padding:5px 12px;border-radius:6px;
  cursor:pointer;letter-spacing:.06em;transition:all .15s;
}
.send-btn:hover{color:var(--gold);border-color:var(--gold2)}

/* ── Footer ──────────────────────────────────────── */
.footer{
  padding:8px 20px 10px;
  font-size:.6rem;color:var(--dim);letter-spacing:.05em;
  text-align:center;width:100%;max-width:900px;
}
.footer span{color:var(--gold2)}

/* ── Spinner ─────────────────────────────────────── */
#spinner{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
  z-index:999;
}
.spin-ring{
  width:44px;height:44px;border-radius:50%;
  border:2px solid var(--border);border-top:2px solid var(--gold);
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-title{font-family:'Syne',sans-serif;color:var(--gold);font-size:1rem;font-weight:700}
.spin-sub{color:var(--dim);font-size:.7rem}
</style>
</head>
<body>

<!-- Loading Spinner -->
<div id="spinner">
  <div class="spin-ring"></div>
  <div class="spin-title">⬡ VAULT BANK</div>
  <div class="spin-sub">Loading WebAssembly module…</div>
</div>

<!-- Header -->
<div class="header">
  <div class="logo">⬡ VAULT <span>BANK</span></div>
  <div class="tag">C + WASM</div>
  <div class="dot"></div>
  <div class="dot-label">running</div>
</div>

<!-- Terminal Window -->
<div class="window">
  <div class="titlebar">
    <div class="tb-dot"></div>
    <div class="tb-dot"></div>
    <div class="tb-dot"></div>
    <div class="tb-title">vault-bank — <span>main.c</span></div>
  </div>

  <!-- Emscripten prints go here -->
  <div id="output"></div>

  <!-- User types here -->
  <div class="input-row">
    <span class="prompt-sym">›</span>
    <input id="input" autocomplete="off" spellcheck="false"
           placeholder="type your input and press Enter"/>
    <button class="send-btn" onclick="sendInput()">ENTER</button>
  </div>
</div>

<div class="footer">
  Mini Banking System &nbsp;|&nbsp; <span>C Language Project</span> &nbsp;|&nbsp; Data saved in WASM virtual filesystem
</div>

<!-- ── Canvas (hidden – required by Emscripten) ─────── -->
<canvas id="canvas" style="display:none"></canvas>

<!-- ── Emscripten Module Configuration ──────────────── -->
<script>
/* -------------------------------------------------------
   Output buffer — Emscripten calls Module.print() for
   every line of printf output. We collect it here and
   render coloured text into the terminal div.
------------------------------------------------------- */
var outputEl = document.getElementById('output');
var inputEl  = document.getElementById('input');

/* Colour rules — applied to lines containing keywords */
function colourLine(text) {
  if (/\[SUCCESS\]/.test(text))          return '<span style="color:#39d98a">' + esc(text) + '</span>';
  if (/ERROR:/.test(text))               return '<span style="color:#ff5f5f">' + esc(text) + '</span>';
  if (/INFO:/.test(text))                return '<span style="color:#60a5fa">' + esc(text) + '</span>';
  if (/={5,}/.test(text))                return '<span style="color:#e2b84a">' + esc(text) + '</span>';
  if (/VAULT BANK|Welcome/.test(text))   return '<span style="color:#e2b84a;font-weight:700">' + esc(text) + '</span>';
  if (/TOTAL BALANCE:/.test(text))       return '<span style="color:#39d98a">' + esc(text) + '</span>';
  return esc(text);
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function appendLine(text) {
  var line = document.createElement('div');
  line.innerHTML = colourLine(text);
  outputEl.appendChild(line);
  outputEl.scrollTop = outputEl.scrollHeight;
}

/* -------------------------------------------------------
   Emscripten stdin queue — user input is queued here.
   When C calls scanf(), Emscripten calls stdin() to get
   the next character. We feed it from our queue.
------------------------------------------------------- */
var inputQueue  = [];   /* array of strings (each a full line) */
var charBuffer  = null; /* current line being fed char by char */
var charPos     = 0;

function sendInput() {
  var val = inputEl.value;
  inputEl.value = '';
  inputEl.focus();

  /* Echo input to terminal */
  var echo = document.createElement('div');
  echo.style.color = '#e2b84a';
  echo.textContent = '  › ' + val;
  outputEl.appendChild(echo);
  outputEl.scrollTop = outputEl.scrollHeight;

  /* Append newline so scanf reads the full token */
  inputQueue.push(val + '\n');
}

/* Send on Enter key */
inputEl.addEventListener('keydown', function(e){
  if (e.key === 'Enter') { e.preventDefault(); sendInput(); }
});

/* -------------------------------------------------------
   Module — Emscripten hooks
------------------------------------------------------- */
var Module = {
  /* Redirect stdout → our terminal */
  print: function(text) {
    appendLine(text);
  },
  printErr: function(text) {
    console.warn('[wasm]', text);
  },

  /* Custom stdin: called by Emscripten when C reads a char */
  stdin: function() {
    /* If no current line, try dequeuing one */
    if (charBuffer === null || charPos >= charBuffer.length) {
      if (inputQueue.length === 0) return null; /* No input yet → block */
      charBuffer = inputQueue.shift();
      charPos    = 0;
    }
    var ch = charBuffer.charCodeAt(charPos);
    charPos++;
    return ch;
  },

  /* Hide spinner once WASM is ready */
  onRuntimeInitialized: function() {
    document.getElementById('spinner').style.display = 'none';
    inputEl.focus();
  },

  /* Required by Emscripten shell */
  canvas: document.getElementById('canvas'),

  setStatus: function(msg) {
    if (msg) console.log('[emcc status]', msg);
  },
  monitorRunDependencies: function(left) {}
};
</script>

<!-- ── Emscripten-generated JS (DO NOT RENAME) ─────── -->
{{{ SCRIPT }}}

</body>
</html>

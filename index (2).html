<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mini Banking System</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:        #0d1117;
      --card:      #161b22;
      --border:    #30363d;
      --accent:    #58a6ff;
      --accent2:   #3fb950;
      --warn:      #f78166;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --input-bg:  #0d1117;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(88,166,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(88,166,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px 28px;
      box-shadow: 0 0 60px rgba(88,166,255,.06), 0 24px 48px rgba(0,0,0,.4);
    }

    /* header */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .logo {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #1158c7);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: .3px;
    }

    .header-text p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* badge */
    .badge {
      margin-left: auto;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      background: rgba(63,185,80,.12);
      color: var(--accent2);
      border: 1px solid rgba(63,185,80,.25);
      padding: 3px 9px;
      border-radius: 20px;
      letter-spacing: .5px;
    }

    /* divider */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 22px;
    }

    /* section label */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* inputs */
    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .input-wrap.full { grid-column: span 2; }

    label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      padding-left: 2px;
    }

    input {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    input::placeholder { color: #484f58; }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88,166,255,.12);
    }

    /* buttons */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 18px;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #1c2128;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
    }

    button:hover {
      background: #21262d;
      border-color: #8b949e;
    }

    button:active { transform: scale(.97); }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
      font-weight: 600;
      grid-column: span 2;
    }

    button.primary:hover { background: #79c0ff; border-color: #79c0ff; }

    button .icon { font-size: 14px; }

    /* terminal output */
    .terminal {
      margin-top: 20px;
      background: #010409;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .terminal-bar {
      background: #161b22;
      border-bottom: 1px solid var(--border);
      padding: 7px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.r { background: #f78166; }
    .dot.y { background: #e3b341; }
    .dot.g { background: #3fb950; }

    .terminal-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-left: 6px;
    }

    .clear-btn {
      margin-left: auto;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      padding: 2px 6px;
    }

    .clear-btn:hover { color: var(--text); background: none; border: none; transform: none; }

    #output {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: #58a6ff;
      padding: 14px 16px;
      height: 180px;
      overflow-y: auto;
      line-height: 1.8;
    }

    #output .line-success { color: var(--accent2); }
    #output .line-error   { color: var(--warn); }
    #output .line-info    { color: var(--accent); }

    #output::-webkit-scrollbar { width: 4px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }

    /* prompt prefix animation */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .prompt { color: var(--accent2); }
  </style>
</head>

<body>

<div class="card">

  <div class="header">
    <div class="logo">🏦</div>
    <div class="header-text">
      <h1>Mini Banking System</h1>
      <p>Account management &amp; transaction log</p>
    </div>
    <span class="badge">LIVE</span>
  </div>

  <hr class="divider"/>

  <p class="section-label">Account Details</p>

  <div class="input-row">
    <div class="input-wrap">
      <label for="accNo">Account Number</label>
      <input id="accNo" type="number" placeholder="e.g. 4567"/>
    </div>
    <div class="input-wrap">
      <label for="amount">Amount (₹)</label>
      <input id="amount" type="number" placeholder="e.g. 5000"/>
    </div>
    <div class="input-wrap full">
      <label for="name">Account Holder Name</label>
      <input id="name" type="text" placeholder="Full name"/>
    </div>
  </div>

  <div class="btn-grid">
    <button class="primary" onclick="createAcc()">
      <span class="icon">＋</span> Create Account
    </button>
    <button onclick="deposit()">
      <span class="icon">↓</span> Deposit
    </button>
    <button onclick="withdraw()">
      <span class="icon">↑</span> Withdraw
    </button>
    <button onclick="search()">
      <span class="icon">⊙</span> Search Account
    </button>
    <button onclick="summary()">
      <span class="icon">≡</span> Account Summary
    </button>
    <button onclick="lastTx()">
      <span class="icon">⧖</span> Last 5 Transactions
    </button>
  </div>

  <div class="terminal">
    <div class="terminal-bar">
      <span class="dot r"></span>
      <span class="dot y"></span>
      <span class="dot g"></span>
      <span class="terminal-label">bank-system ~ output</span>
      <button class="clear-btn" onclick="clearOutput()">clear</button>
    </div>
    <div id="output"></div>
  </div>

</div>

<!-- Same Module setup as original -->
<script>
  var Module = {
    print: function(text) {
      var out = document.getElementById("output");
      out.innerHTML += '<span class="line-info"><span class="prompt">$ </span>' + text + '</span><br>';
      out.scrollTop = out.scrollHeight;
    }
  };
</script>

<script src="index.js"></script>

<script>
  function log(msg, type) {
    var out = document.getElementById("output");
    var cls = type === 'error' ? 'line-error' : type === 'success' ? 'line-success' : 'line-info';
    out.innerHTML += '<span class="' + cls + '"><span class="prompt">→ </span>' + msg + '</span><br>';
    out.scrollTop = out.scrollHeight;
  }

  function clearOutput() {
    document.getElementById("output").innerHTML = '';
  }

  function createAcc() {
    var acc  = parseInt(document.getElementById("accNo").value);
    var name = document.getElementById("name").value;
    var bal  = parseFloat(document.getElementById("amount").value);
    Module.ccall('createAccount', 'number', ['number','string','number'], [acc, name, bal]);
    log("Account created successfully", "success");
  }

  function deposit() {
    var acc = parseInt(document.getElementById("accNo").value);
    var amt = parseFloat(document.getElementById("amount").value);
    var result = Module.ccall('deposit', 'number', ['number','number'], [acc, amt]);
    if (result === -1) log("Account not found", "error");
    else log("Deposit successful — New Balance: ₹" + result, "success");
  }

  function withdraw() {
    var acc = parseInt(document.getElementById("accNo").value);
    var amt = parseFloat(document.getElementById("amount").value);
    var result = Module.ccall('withdraw', 'number', ['number','number'], [acc, amt]);
    if (result === -1)      log("Account not found", "error");
    else if (result === -2) log("Insufficient balance", "error");
    else                    log("Withdrawal successful — New Balance: ₹" + result, "success");
  }

  function search() {
    var acc = parseInt(document.getElementById("accNo").value);
    var result = Module.ccall('searchAccount', 'number', ['number'], [acc]);
    if (result === -1) log("Account not found", "error");
    else log("Balance: ₹" + result, "success");
  }

  function summary() {
    Module.ccall('accountSummary');
  }

  function lastTx() {
    var acc = parseInt(document.getElementById("accNo").value);
    Module.ccall('lastTransactions', null, ['number'], [acc]);
  }
</script>

</body>
</html>
